name: Build Android APK (offline)

# Oflayn (Kivy) ilovaning .apk faylini GitHub serverlarida avtomatik yig'adi.
#
# MUHIM: Eski "ArtemSBulgakov/buildozer-action" tashlandi — u o'z Docker image'ini
# qurishda muvaffaqiyatsiz tugar edi ("Docker build failed"). Endi Buildozer
# to'g'ridan-to'g'ri ubuntu-22.04 da, Kivy hujjatlari tavsiya etgan usulda
# ishga tushiriladi (ishonchli).
#
# Natija:
#   - .apk har doim "Artifacts" sifatida yuklanadi
#   - .apk "Releases" sahifasiga ham joylanadi:
#       * oddiy build -> "android-latest" (oldindan-reliz, doimiy havola)
#       * v* teg       -> o'sha teg nomidagi rasmiy reliz
on:
  push:
    branches: [ main ]
    paths:
      - 'offline/**'
      - '.github/workflows/build-apk.yml'
    tags:
      - 'v*'
  # PR (offline/ ga tegsa) ham .apk ni yig'adi va "Artifacts" ga yuklaydi —
  # shunda APK ni main'ga merge qilmasdan ham yuklab olish mumkin.
  pull_request:
    branches: [ main ]
    paths:
      - 'offline/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Repozitoriyni olish
        uses: actions/checkout@v4

      - name: Python 3.11 o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: JDK 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Tizim kutubxonalari (Buildozer/p4a uchun)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache

      - name: Buildozer + Cython o'rnatish
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # Cython 0.29.x — p4a/kivy recipe'lari bilan eng barqaror kombinatsiya
          pip install "Cython==0.29.36" buildozer

      - name: Buildozer keshi (SDK/NDK qayta yuklamaslik uchun)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            offline/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('offline/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: APK yig'ish (buildozer android debug)
        working-directory: offline
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # 'yes |' — har qanday litsenziya/interaktiv so'rovlarni avtomatik tasdiqlaydi
          yes | buildozer -v android debug

      - name: APK ni artefakt sifatida yuklash
        uses: actions/upload-artifact@v4
        with:
          name: Spektranaliz-EEG-Pro-AI-apk
          path: offline/bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: APK ni Release ga joylash
        # Reliz faqat push/teg/dispatch da yaratiladi — PR build'larida emas.
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'android-latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Android APK (oxirgi build)' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          body: |
            Spektranaliz EEG Pro AI — oflayn Android ilovasi (.apk).
            Bu fayl GitHub Actions tomonidan avtomatik yig'ilgan (debug build).
            Telefonga o'rnatish uchun "Noma'lum manbalardan o'rnatish" ruxsatini yoqing.
          files: offline/bin/*.apk
