name: Build Android APK (offline)

# Oflayn (Kivy) ilovaning .apk faylini GitHub serverlarida avtomatik yig'adi.
# Ishga tushadi:
#   - main ga offline/ yoki workflow o'zgarsa
#   - "Actions" sahifasidan qo'lda (workflow_dispatch)
#   - v* ko'rinishidagi teg (masalan v3.0.0) push qilinganda
#
# Natija:
#   - .apk har doim "Artifacts" sifatida yuklanadi
#   - .apk avtomatik "Releases" sahifasiga ham joylanadi:
#       * oddiy build  -> "android-latest" (oldindan-reliz, doimiy havola)
#       * v* teg        -> o'sha teg nomidagi rasmiy reliz
on:
  push:
    branches: [ main ]
    paths:
      - 'offline/**'
      - '.github/workflows/build-apk.yml'
    tags:
      - 'v*'
  workflow_dispatch:

# Release yaratish/yuklash uchun GITHUB_TOKEN ga yozish huquqi kerak
permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Repozitoriyni olish
        uses: actions/checkout@v4

      - name: Buildozer bilan .apk yig'ish
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          workdir: offline
          buildozer_version: stable

      - name: APK ni artefakt sifatida yuklash
        uses: actions/upload-artifact@v4
        with:
          name: Spektranaliz-EEG-Pro-AI-apk
          path: offline/bin/*.apk
          if-no-files-found: error
          retention-days: 30

      # .apk ni "Releases" sahifasiga joylash (yuklab olish uchun barqaror havola)
      - name: APK ni Release ga joylash
        uses: softprops/action-gh-release@v2
        with:
          # v* teg bo'lsa -> o'sha teg; aks holda -> "android-latest" (rolling)
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'android-latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Android APK (oxirgi build)' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          body: |
            Spektranaliz EEG Pro AI — oflayn Android ilovasi (.apk).
            Bu fayl GitHub Actions tomonidan avtomatik yig'ilgan (debug build).
            Telefonga o'rnatish uchun "Noma'lum manbalardan o'rnatish" ruxsatini yoqing.
          files: offline/bin/*.apk
