name: spektranaliz_eeg_pro_ai
description: "Sportchining EEG signallarini spektral tahlil qilish — mobil ilova (Android/iOS)."
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Server bilan HTTP aloqasi (fayl yuklash, JSON natija)
  http: ^1.2.0

  # Qurilmadan EEG fayl (EDF/BDF/CSV) tanlash
  file_picker: ^8.0.0

  # Diagrammalar (ritm ustunlari, PSD egri chizig'i)
  fl_chart: ^0.68.0

  # Server manzili kabi sozlamalarni saqlash
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Ilova ishga tushiruvchi ikonkasini (launcher icon) generatsiya qilish
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Fon, logotip va ikonka rasmlari (ish stoli dasturi bilan bir xil dizayn)
  assets:
    - assets/images/logo.png
    - assets/images/logo_dark.png
    - assets/images/icon.png
    - assets/images/background.jpg

# Android/iOS ilova ikonkasi (ish stoli dasturi ikonkasidan).
# Generatsiya qilish:  flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  # Android 8+ adaptiv ikonka (chuqur ko'k fon + logo emblema)
  adaptive_icon_background: "#1B3A6B"
  adaptive_icon_foreground: "assets/images/icon.png"
